<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Quy Đổi Tỉ Giá Real-time</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/odometer.js/0.4.7/themes/odometer-theme-minimal.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/odometer.js/0.4.7/odometer.min.js"></script>
    <style>
        .odometer { font-family: 'Courier New', monospace; font-weight: bold; }
        .decimal-dim { color: #6b7280; font-size: 0.85em; } /* Màu xám cho phần thập phân */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:focus-within {
            background: rgba(255, 255, 255, 0.07);
            border-color: #818cf8;
            transform: translateY(-2px);
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-lg space-y-6">
    <div class="text-center space-y-2">
        <h1 class="text-3xl font-extrabold bg-gradient-to-r from-indigo-400 to-emerald-400 bg-clip-text text-transparent">
            QUY ĐỔI TỈ GIÁ TỰ ĐỘNG
        </h1>
        <p class="text-xs text-slate-500 uppercase tracking-widest" id="status">Đang cập nhật tỉ giá trực tuyến...</p>
    </div>

    <div class="space-y-4" id="main-container">
        </div>
</div>

<script>
// Cấu hình đơn vị
const config = [
    { id: 'NESO', name: 'NESO', icon: 'https://cdn-icons-png.flaticon.com/512/845/845665.png', color: 'text-indigo-400' },
    { id: 'NXPC', name: 'NXPC', icon: 'https://cryptologos.cc/logos/maplestory-nxpc-logo.png', color: 'text-emerald-400' },
    { id: 'USD', name: 'USD', icon: 'https://cdn-icons-png.flaticon.com/512/197/197484.png', color: 'text-blue-400' },
    { id: 'VND', name: 'VND', icon: 'https://cdn-icons-png.flaticon.com/512/197/197473.png', color: 'text-red-400' }
];

let exchangeRates = {
    NXPC_USD: 0.27, // Mặc định nếu API lỗi
    USD_VND: 25400,
    NESO_NXPC: 100000
};

// Hàm lấy tỉ giá từ API
async function fetchRates() {
    try {
        // 1. Lấy giá NXPC từ Binance (hoặc sàn khác)
        const nxpcRes = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=NXPCUSDT');
        const nxpcData = await nxpcRes.json();
        exchangeRates.NXPC_USD = parseFloat(nxpcData.price);

        // 2. Lấy tỉ giá USD/VND
        const vndRes = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
        const vndData = await vndRes.json();
        exchangeRates.USD_VND = vndData.rates.VND;

        document.getElementById('status').innerText = `Tỉ giá: 1 NXPC ≈ $${exchangeRates.NXPC_USD.toFixed(3)} | $1 ≈ ${exchangeRates.USD_VND.toLocaleString()} VND`;
    } catch (e) {
        document.getElementById('status').innerText = "Dùng tỉ giá mặc định (API giới hạn)";
    }
}

// Render giao diện
const container = document.getElementById('main-container');
config.forEach(item => {
    container.innerHTML += `
        <div class="glass-card p-4 rounded-2xl flex items-center gap-4">
            <img src="${item.icon}" class="w-10 h-10 rounded-full shadow-lg border border-slate-700" onerror="this.src='https://via.placeholder.com/40'">
            <div class="flex-1 min-w-0">
                <input type="number" id="input-${item.id}" 
                    class="bg-transparent w-full text-2xl font-bold outline-none placeholder-slate-700" 
                    placeholder="0.00">
                <div class="text-sm" id="display-${item.id}">
                    <span class="odometer" id="odo-${item.id}">0</span><span id="decimal-${item.id}" class="decimal-dim"></span>
                </div>
            </div>
            <span class="font-black italic ${item.color}">${item.name}</span>
        </div>
    `;
});

// Logic tính toán
function updateAll(sourceId, value) {
    let nxpcBase = 0;

    // Quy đổi về NXPC làm gốc
    if (sourceId === 'NESO') nxpcBase = value / exchangeRates.NESO_NXPC;
    else if (sourceId === 'NXPC') nxpcBase = value;
    else if (sourceId === 'USD') nxpcBase = value / exchangeRates.NXPC_USD;
    else if (sourceId === 'VND') nxpcBase = (value / exchangeRates.USD_VND) / exchangeRates.NXPC_USD;

    config.forEach(item => {
        let result = 0;
        if (item.id === 'NESO') result = nxpcBase * exchangeRates.NESO_NXPC;
        else if (item.id === 'NXPC') result = nxpcBase;
        else if (item.id === 'USD') result = nxpcBase * exchangeRates.NXPC_USD;
        else if (item.id === 'VND') result = nxpcBase * exchangeRates.NXPC_USD * exchangeRates.USD_VND;

        // Cập nhật ô input (trừ ô đang nhập)
        if (item.id !== sourceId) {
            document.getElementById(`input-${item.id}`).value = result.toFixed(item.id === 'VND' ? 0 : 4);
        }

        // Cập nhật hiệu ứng Odometer và phần thập phân mờ
        const integerPart = Math.floor(result);
        const decimalPart = (result - integerPart).toFixed(4).substring(2);
        
        document.getElementById(`odo-${item.id}`).innerHTML = integerPart;
        document.getElementById(`decimal-${item.id}`).innerHTML = `,${decimalPart}`;
    });
}

// Gán sự kiện
config.forEach(item => {
    const input = document.getElementById(`input-${item.id}`);
    input.addEventListener('input', (e) => {
        updateAll(item.id, parseFloat(e.target.value) || 0);
    });
});

// Chạy lần đầu
fetchRates();
</script>

</body>
</html>
